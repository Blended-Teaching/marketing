<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Paper Form</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; overflow: hidden; }
    body {
      display: flex; align-items: flex-start; justify-content: center;
      padding: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      background: #ffffff; border-radius: 20px; padding: 36px 32px 28px;
      width: 100%; max-width: 480px; overflow: hidden;
    }
    .field { margin-bottom: 20px; }
    label { display: block; font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    input {
      width: 100%; padding: 16px 18px; border: 1.5px solid #e2e5ef;
      border-radius: 10px; font-size: 15px; color: #333; background: #f8f9fc;
      outline: none; transition: border-color 0.2s;
    }
    input::placeholder { color: #aab0c0; }
    input:focus { border-color: #6366f1; background: #fff; }
    .submit-btn {
      width: 100%; padding: 18px; background: #6366f1; color: #fff; border: none;
      border-radius: 10px; font-size: 17px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 8px; transition: background 0.2s;
    }
    .submit-btn:hover { background: #4f46e5; }
    .submit-btn:disabled { background: #6366f1; cursor: not-allowed; }
    .submit-btn svg { width: 20px; height: 20px; }
    .spinner {
      width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success {
      display: none; text-align: center; color: #6366f1;
      font-weight: 600; font-size: 15px; margin-top: 16px;
    }
    .legal { text-align: center; font-size: 12px; color: #9ca3af; margin-top: 14px; }
    .legal a { color: #9ca3af; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="field">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Jane Cooper" autocomplete="name" required>
    </div>
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="jane@university.edu" autocomplete="email" required>
    </div>
    <button class="submit-btn" id="btn" type="button" onclick="submitForm()">
      <span id="btn-text">Get My Free Exam Paper</span>
      <svg id="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
      <div class="spinner" id="spinner"></div>
    </button>
    <p class="success" id="success">Your download is starting!</p>
    <p class="legal">By clicking, you agree to our <a href="https://www.blended-teaching.com/instructors-terms" target="_blank">Terms of Service</a> and <a href="https://www.blended-teaching.com/privacy" target="_blank">Privacy Policy</a>.</p>
  </div>
  <script>
    async function submitForm() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const btn = document.getElementById("btn");
      const btnText = document.getElementById("btn-text");
      const btnIcon = document.getElementById("btn-icon");
      const spinner = document.getElementById("spinner");
      if (!name || !email) { alert("Please fill in both fields."); return; }
      btn.disabled = true;
      btnText.textContent = "Preparing your download...";
      btnIcon.style.display = "none";
      spinner.style.display = "block";
      await new Promise(r => setTimeout(r, 1500));
      const link = document.createElement("a");
      link.href = "https://raw.githubusercontent.com/Blended-Teaching/marketing/main/exam-paper.pdf";
      link.download = "exam-paper.pdf";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      btn.style.display = "none";
      document.getElementById("success").style.display = "block";
    }
  </script>
</body>
</html>
